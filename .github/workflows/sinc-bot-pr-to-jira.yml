name: Sync Bot PRs to Jira

on:
  pull_request:
    types: [opened]
  workflow_dispatch:
    inputs:
      bot_actor:
        description: 'Bot actor para simular (ex: dependabot[bot])'
        required: false
        default: 'dependabot[bot]'
        type: string
      pr_title:
        description: 'Título do PR para o teste'
        required: false
        default: 'test: Update dependencies'
        type: string
      pr_url:
        description: 'URL do PR (opcional)'
        required: false
        default: 'https://github.com/eurounionconsult/PondiFarmApp/pull/test'
        type: string

jobs:
  sync-to-jira:
    runs-on: ubuntu-latest
    # Só corre se for bot (ou manual via workflow_dispatch)
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.actor == 'dependabot[bot]' ||
      github.actor == 'release-please[bot]' ||
      github.actor == 'dependabot' ||
      startsWith(github.actor, 'renovate')
    
    steps:
      - name: Prepare Jira issue payload
        id: prepare
        run: |
          # Determina o tipo de bot
          ACTOR="${{ github.event.inputs.bot_actor || github.actor }}"
          
          if [[ "$ACTOR" == *"dependabot"* ]]; then
            BOT_TYPE="Dependabot"
          elif [[ "$ACTOR" == *"release-please"* ]]; then
            BOT_TYPE="Release Please"
          elif [[ "$ACTOR" == *"renovate"* ]]; then
            BOT_TYPE="Renovate"
          else
            BOT_TYPE="Bot"
          fi
          
          echo "bot_type=$BOT_TYPE" >> $GITHUB_OUTPUT
          
          # Extrai o nome do branch/feature
          FEATURE="${{ github.head_ref || 'test-branch' }}"
          echo "feature=$FEATURE" >> $GITHUB_OUTPUT

      - name: Create Jira issue
        run: |
          # Dados do Jira
          JIRA_DOMAIN="eurounionconsult.atlassian.net"
          PROJECT_KEY="EURODEV"

          DUEDATE=$(date -u -d '+7 days' +%Y-%m-%d)
          
          # Usa inputs do workflow_dispatch se disponível, senão dados do PR real
          TITLE="${{ github.event.inputs.pr_title || github.event.pull_request.title }}"
          PR_URL="${{ github.event.inputs.pr_url || github.event.pull_request.html_url }}"
          ACTOR="${{ github.event.inputs.bot_actor || github.actor }}"
          
          ISSUE_PAYLOAD=$(cat <<EOF
          {
            "fields": {
              "project": {
                "key": "$PROJECT_KEY"
              },
              "summary": "${{ steps.prepare.outputs.bot_type }} - $TITLE",
              "description": {
                "version": 1,
                "type": "doc",
                "content": [
                  {
                    "type": "paragraph",
                    "content": [
                      {
                        "type": "text",
                        "text": "GitHub PR: $PR_URL\n\nAutor: $ACTOR\n\nBranch: ${{ github.head_ref || 'test-branch' }}\n\nTrigger: ${{ github.event_name }}"
                      }
                    ]
                  }
                ]
              },
              "issuetype": {
                "name": "Task"
              },
              "labels": ["BOT", "automation", "${{ steps.prepare.outputs.bot_type }}"],
              "priority": {
                "name": "Low"
              },
              "duedate": "$DUEDATE"
            }
          }
          EOF
          )
          
          echo "📋 Payload que será enviado:"
          echo "$ISSUE_PAYLOAD" | jq .
          
          # Faz POST para Jira
          curl -X POST \
            -H "Authorization: Basic $(echo -n '${{ secrets.JIRA_USER_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}' | base64)" \
            -H "Content-Type: application/json" \
            -d "$ISSUE_PAYLOAD" \
            "https://$JIRA_DOMAIN/rest/api/3/issue"